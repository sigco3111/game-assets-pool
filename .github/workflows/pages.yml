name: Deploy Pages (Catalog Site)

on:
  push:
    branches: [ main ]
    paths:
      - 'site/**'
      - 'metadata/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 1
          # Ensure submodule directories are populated with files
          lfs: false

      - name: Init and update all submodules
        run: |
          git submodule update --init --depth 1 --recursive

      - name: Verify submodules populated
        run: |
          echo "=== submodule READMEs ==="
          for d in curated/*/; do
            if [ -d "$d" ] && [ -f "$d/README.md" ]; then
              echo "  $(basename $d): $(wc -l < $d/README.md) lines"
            else
              echo "  $(basename $d): EMPTY"
            fi
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Regenerate site
        # build-index.py reads curated/, extracted/, free/ inside the repo
        run: |
          python3 tools/build-index.py
          python3 tools/build-site.py

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
