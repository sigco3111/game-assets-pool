<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Game Assets Catalog 🎮 — 오픈소스 게임 에셋 카탈로그</title>
<style>
:root {
  --bg: #0f1419;
  --card: #1a2332;
  --card-hover: #233144;
  --border: #2a3f5f;
  --text: #e6e8eb;
  --text-dim: #8aa2c0;
  --accent: #4a90e2;
  --accent-glow: rgba(74, 144, 226, 0.3);
  --cc0: #4a9b5c;
  --ccby: #c7a14e;
  --ccbysa: #c47832;
  --gpl: #8b5cf6;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, "Helvetica Neue", sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
header { background: linear-gradient(135deg, #1e3a5f 0%, #0a1929 100%); padding: 3rem 2rem 2rem; border-bottom: 1px solid var(--border); }
header h1 { font-size: 2.2rem; margin-bottom: 0.5rem; }
header p { color: var(--text-dim); font-size: 1.05rem; max-width: 800px; }
header .stats { display: flex; gap: 1.5rem; margin-top: 1.25rem; flex-wrap: wrap; }
header .stat { background: rgba(255, 255, 255, 0.05); padding: 0.6rem 1rem; border-radius: 8px; }
header .stat-num { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
header .stat-label { font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }

.container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
.controls { background: var(--card); padding: 1rem 1.25rem; border-radius: 12px; margin-bottom: 1.5rem; display: grid; grid-template-columns: 1fr auto auto auto; gap: 0.75rem; align-items: center; }
.controls input, .controls select { background: #0f1a2b; border: 1px solid var(--border); color: var(--text); padding: 0.5rem 0.8rem; border-radius: 6px; font-size: 0.9rem; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 1rem; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: all 0.18s; display: flex; flex-direction: column; }
.card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: 0 8px 24px var(--accent-glow); }
.card-thumb { width: 100%; aspect-ratio: 4/3; background: linear-gradient(135deg, #1e293f, #0d1320); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
.card-thumb img { width: 100%; height: 100%; object-fit: contain; padding: 0.5rem; }
.card-thumb.no-thumb { background: linear-gradient(135deg, #2a3f5f, #1a2332); display: flex; align-items: center; justify-content: center; }
.card-thumb.no-thumb::before { content: attr(data-icon); font-size: 3.5rem; opacity: 0.5; }
.card-body { padding: 0.85rem 1rem; flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }
.card-title { font-weight: 600; font-size: 0.95rem; color: var(--text); line-height: 1.35; text-decoration: none; }
.card-title:hover { color: var(--accent); }
.card-desc { color: var(--text-dim); font-size: 0.82rem; line-height: 1.45; flex: 1; }
.card-meta { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.4rem; font-size: 0.72rem; }
.badge { padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
.badge-cat { background: #2a3f5f; color: #8aa2c0; }
.badge-lic { background: rgba(74, 155, 92, 0.2); color: #6ce5b3; border: 1px solid rgba(74, 155, 92, 0.4); }
.badge-lic.cc-by-sa { background: rgba(196, 120, 50, 0.2); color: #e8b380; border-color: rgba(196, 120, 50, 0.4); }
.badge-lic.gpl { background: rgba(139, 92, 246, 0.2); color: #b59cf4; border-color: rgba(139, 92, 246, 0.4); }
.badge-lic.unknown { background: rgba(244, 132, 132, 0.15); color: #f48484; border-color: rgba(244, 132, 132, 0.4); }
.badge-tag { background: rgba(74, 144, 226, 0.18); color: #8bbdf3; border: 1px solid rgba(74, 144, 226, 0.3); }
.badge-size { background: rgba(255, 255, 255, 0.04); color: var(--text-dim); border: 1px solid var(--border); }
.card-link { margin-top: 0.5rem; display: inline-flex; align-items: center; gap: 0.25rem; color: var(--accent); text-decoration: none; font-size: 0.78rem; font-weight: 600; }
.card-link:hover { text-decoration: underline; }

.empty-state { grid-column: 1 / -1; text-align: center; padding: 4rem 1rem; color: var(--text-dim); }
.pagination { display: flex; justify-content: center; gap: 0.5rem; margin-top: 1.5rem; }
.pagination button { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 0.45rem 0.9rem; border-radius: 6px; cursor: pointer; }
.pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
.pagination button:hover:not(:disabled) { background: var(--card-hover); border-color: var(--accent); }

footer { text-align: center; padding: 2.5rem 1rem; color: #5a6b80; font-size: 0.85rem; border-top: 1px solid var(--border); margin-top: 3rem; }
footer a { color: var(--text-dim); text-decoration: none; }
footer a:hover { color: var(--accent); }
</style>
</head>
<body>
<header>
  <div class="container">
    <h1>🎮 Game Assets Catalog</h1>
    <p>오픈소스 게임 에셋 카탈로그 — <strong id="stats-assets">—</strong>개 팩 카드 뷰 + 라이선스 추적 + 썸네일. 풀: <strong>11,306 큐레이션 + 1,088 Wesnoth + 5게임 추출</strong>. <a href="https://github.com/sigco3111/game-assets-pool" style="color:var(--accent);">sigco3111/game-assets-pool</a></p>
    <div class="stats">
      <div class="stat"><div class="stat-num" id="stat-total">—</div><div class="stat-label">카드</div></div>
      <div class="stat"><div class="stat-num" id="stat-thumb">—</div><div class="stat-label">썸네일</div></div>
      <div class="stat"><div class="stat-num" id="stat-cc0">—</div><div class="stat-label">CC0</div></div>
      <div class="stat"><div class="stat-num" id="stat-cat">—</div><div class="stat-label">Categories</div></div>
      <div class="stat"><div class="stat-num" id="stat-pool-total">11,306</div><div class="stat-label">풀 큐레이션</div></div>
    </div>
  </div>
</header>

<div class="container">
  <div id="data-banner" style="display:none;background:rgba(74, 144, 226, 0.12);border:1px solid rgba(74, 144, 226, 0.4);border-radius:8px;padding:0.85rem 1rem;margin-bottom:1rem;color:#8bbdf3;font-size:0.88rem;"></div>
  <div class="controls">
    <input type="search" id="q" placeholder="🔍 제목, 카테고리, 태그 검색…">
    <select id="cat"><option value="">전체 카테고리</option></select>
    <select id="lic"><option value="">전체 라이선스</option></select>
    <select id="view">
      <option value="all">전체</option>
      <option value="thumb">썸네일 있는 것만</option>
    </select>
  </div>

  <div class="grid" id="grid"></div>

  <div class="pagination">
    <button id="prev" onclick="prevPage()">‹ 이전</button>
    <span id="pinfo" style="padding:0.6rem 1rem;color:var(--text-dim);"></span>
    <button id="next" onclick="nextPage()">다음 ›</button>
  </div>
</div>

<footer>
  <p>
    <a href="https://github.com/sigco3111/game-assets-pool">풀 저장소</a> · 
    <a href="https://sigco3111.github.io/game-assets-pool/">GitHub Pages 카탈로그</a> · 
    <a href="https://game-assets-pool.vercel.app/">Vercel (이 사이트)</a>
  </p>
  <p style="margin-top:0.6rem;">자동 생성 — 카탈로그 JSON: <code>PUBLIC/data/cards.json</code></p>
</footer>

<script>
const PAGE_SIZE = 24;
let page = 0;
let allAssets = [];
let allLinks = [];

function escapeHtml(s) {
  return (s || '').toString().replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])
  );
}

const licEmoji = {
  'CC0-1.0': '🌐 CC0',
  'CC-BY-4.0': '©️ CC-BY',
  'CC-BY-SA-4.0': '©️ CC-BY-SA',
  'GPL-2.0-only': '🄯 GPL',
  'MIT': '🄯 MIT',
  'UNKNOWN': '❓ UNKNOWN',
};

function categoryIcon(cat) {
  if (cat.includes('캐릭터')) return '🧙';
  if (cat.includes('소품')) return '🪵';
  if (cat.includes('타일')) return '🧱';
  if (cat.includes('환경')) return '🌄';
  if (cat.includes('오브젝트')) return '📦';
  if (cat.includes('PBR')) return '🎨';
  if (cat.includes('아이콘')) return '🎯';
  if (cat.includes('스프라이트')) return '👾';
  if (cat.includes('SVG')) return '✨';
  if (cat.includes('Voxel')) return '🧊';
  if (cat.includes('프롬프트')) return '💬';
  if (cat.includes('카탈로그')) return '📚';
  if (cat.includes('오디오')) return '🔊';
  if (cat.includes('2D+3D')) return '🎲';
  if (cat.includes('리스트')) return '📜';
  return '🎴';
}

function licClass(lic) {
  if (!lic || lic === 'UNKNOWN') return 'unknown';
  if (lic.includes('CC0')) return '';
  if (lic.includes('CC-BY-SA')) return 'cc-by-sa';
  if (lic.includes('GPL')) return 'gpl';
  return '';
}

async function init() {
  const r = await fetch('/data/cards.json');
  const data = await r.json();
  allAssets = data.assets || [];
  allLinks = data.links || [];

  // header stats
  document.getElementById('stats-assets').textContent = allAssets.length.toLocaleString();
  document.getElementById('stat-total').textContent = (allAssets.length + allLinks.length).toLocaleString();
  document.getElementById('stat-thumb').textContent = (data.stats.with_thumbnail || 0).toLocaleString();
  const cc0Count = allAssets.filter(a => a.license && a.license.includes('CC0')).length;
  document.getElementById('stat-cc0').textContent = cc0Count;
  const catCount = new Set(allAssets.map(a => a.category)).size;
  document.getElementById('stat-cat').textContent = catCount;

  // populate filters
  const cats = [...new Set(allAssets.map(a => a.category))].sort();
  const catsSel = document.getElementById('cat');
  cats.forEach(c => catsSel.innerHTML += `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`);

  const lics = [...new Set(allAssets.map(a => a.license))].sort();
  const licsSel = document.getElementById('lic');
  lics.forEach(l => licsSel.innerHTML += `<option value="${escapeHtml(l)}">${escapeHtml(l)}</option>`);

  // 푸 풀 사이즈 banner — 작은 풀(20)이면 submodule-sync 문제로 잘릴 가능성 알림
  const banner = document.getElementById('data-banner');
  if (banner) {
    if (allAssets.length < 50) {
      banner.style.display = 'block';
      banner.style.background = 'rgba(244, 132, 132, 0.12)';
      banner.style.borderColor = 'rgba(244, 132, 132, 0.3)';
      banner.style.color = '#f4aaaa';
      banner.innerHTML = '⚠️ 이 카탈로그는 <strong>' + allAssets.length + '개 카드</strong>만 표시 중입니다. GitHub Actions submodule 동기화 이슈 — <a href="https://github.com/sigco3111/game-assets-pool/actions/workflows/pages.yml">workflow log</a>에서 progress 확인. 풀은 <strong>11,306 큐레이션 + 1,088 Wesnoth</strong>입니다.';
    } else {
      banner.style.display = 'block';
      banner.innerHTML = 'ℹ️ 표시 중: <strong>' + allAssets.length.toLocaleString() + '</strong> 팩 카드 (썸네일 ' + allAssets.filter(a=>a.thumbnail).length + '개) — 풀 큐레이션 11,306개는 <a href="https://github.com/sigco3111/game-assets-pool/blob/main/metadata/INDEX.json">metadata/INDEX.json</a>에 별도 저장';
    }
  }
  render();
}

function filtered() {
  const q = document.getElementById('q').value.toLowerCase().trim();
  const cat = document.getElementById('cat').value;
  const lic = document.getElementById('lic').value;
  const view = document.getElementById('view').value;

  return allAssets.filter(a => {
    if (cat && a.category !== cat) return false;
    if (lic && a.license !== lic) return false;
    if (view === 'thumb' && !a.thumbnail) return false;
    if (q) {
      const hay = (a.title + ' ' + a.description + ' ' + (a.tags || []).join(' ')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function render() {
  const list = filtered();
  const total = list.length;
  const start = page * PAGE_SIZE;
  const end = Math.min(start + PAGE_SIZE, total);
  const slice = list.slice(start, end);

  const grid = document.getElementById('grid');
  if (slice.length === 0) {
    grid.innerHTML = '<div class="empty-state">🔍 매치 없음 — 검색어나 필터를 조정해 보세요.</div>';
  } else {
    grid.innerHTML = slice.map(a => {
      const licBadge = licEmoji[a.license] || a.license;
      const licCls = licClass(a.license);
      const tagsHtml = (a.tags || []).map(t => `<span class="badge badge-tag">${escapeHtml(t)}</span>`).join('');
      const size = a.size_mb ? `<span class="badge badge-size">${a.size_mb} MB</span>` : '';
      const thumb = a.thumbnail
        ? `<div class="card-thumb"><img src="${escapeHtml(a.thumbnail)}" loading="lazy" alt="${escapeHtml(a.title)}"></div>`
        : `<div class="card-thumb no-thumb" data-icon="${categoryIcon(a.category)}"></div>`;
      const link = a.url ? `<a class="card-link" href="${escapeHtml(a.url)}" target="_blank">소스 보기 ↗</a>` : '';
      const titleLink = a.url
        ? `<a class="card-title" href="${escapeHtml(a.url)}" target="_blank">${escapeHtml(a.title)}</a>`
        : `<div class="card-title">${escapeHtml(a.title)}</div>`;
      return `<div class="card">
        ${thumb}
        <div class="card-body">
          ${titleLink}
          <div class="card-desc">${escapeHtml(a.description || '')}</div>
          <div class="card-meta">
            <span class="badge badge-cat">${escapeHtml(a.category)}</span>
            <span class="badge badge-lic ${licCls}">${escapeHtml(licBadge)}</span>
            ${size}
            ${tagsHtml}
          </div>
          ${link}
        </div>
      </div>`;
    }).join('');
  }
  document.getElementById('pinfo').textContent = `${(start+1).toLocaleString()}–${end.toLocaleString()} / ${total.toLocaleString()}`;
  document.getElementById('prev').disabled = page === 0;
  document.getElementById('next').disabled = end >= total;
  if (start >= total && page > 0) { page = 0; render(); }
}

function prevPage() { if (page > 0) { page--; render(); window.scrollTo({top:0, behavior:'smooth'}); } }
function nextPage() { page++; render(); window.scrollTo({top:0, behavior:'smooth'}); }

document.getElementById('q').addEventListener('input', () => { page = 0; render(); });
document.getElementById('cat').addEventListener('change', () => { page = 0; render(); });
document.getElementById('lic').addEventListener('change', () => { page = 0; render(); });
document.getElementById('view').addEventListener('change', () => { page = 0; render(); });

init();
</script>
</body>
</html>
